<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota Angsuran</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: #000;
  background: #fff;
  padding: 20px;
}

.nota {
  max-width: 320px;
  margin: 0 auto;
  border: 1px dashed #000;
  padding: 15px;
}

.header {
  text-align: center;
  border-bottom: 1px dashed #000;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

.header h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 3px;
}

.header p {
  font-size: 10px;
  color: #555;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.row.label {
  font-weight: 600;
}

.divider {
  border-top: 1px dashed #000;
  margin: 10px 0;
}

.total {
  font-size: 14px;
  font-weight: 700;
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 10px;
  color: #555;
}

.btn-print {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  background: #1e88e5;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
}

@media print {
  body {
    padding: 0;
  }
 .btn-print {
    display: none;
  }
 .nota {
    border: none;
  }
}

@media (max-width: 400px) {
  body {
    padding: 10px;
  }
}
</style>
</head>
<body>

<div class="nota" id="nota">
  <div class="header">
    <h2>KOPERASI ARFA DRIVER</h2>
    <p>BUKTI PEMBAYARAN ANGSURAN</p>
  </div>

  <div class="row">
    <span>Nama</span>
    <span id="nama">-</span>
  </div>

  <div class="row">
    <span>ID Pinjaman</span>
    <span id="idPinjaman">-</span>
  </div>

  <div class="row">
    <span>Tanggal</span>
    <span id="tanggal">-</span>
  </div>

  <div class="row">
    <span>Metode</span>
    <span id="metode">-</span>
  </div>

  <div class="divider"></div>

  <div class="row">
    <span>Bayar Pokok</span>
    <span id="pokok">Rp 0</span>
  </div>

  <div class="row">
    <span>Bayar Jasa</span>
    <span id="jasa">Rp 0</span>
  </div>

  <div class="divider"></div>

  <div class="row total">
    <span>Total Bayar</span>
    <span id="total">Rp 0</span>
  </div>

  <div class="footer">
    <p>Terima kasih atas pembayarannya</p>
    <p>Simpan nota ini sebagai bukti yang sah</p>
  </div>
</div>

<button class="btn-print" onclick="window.print()">Cetak Nota</button>

<script>
function formatRupiah(n){
  return Number(n || 0).toLocaleString("id-ID", {style:"currency", currency:"IDR"});
}

const params = new URLSearchParams(window.location.search);

document.getElementById('nama').innerText = params.get('nama') || '-';
document.getElementById('idPinjaman').innerText = params.get('idPinjaman') || '-';
document.getElementById('tanggal').innerText = params.get('tanggal') || '-';
document.getElementById('metode').innerText = (params.get('metode') || 'cash').toUpperCase();
document.getElementById('pokok').innerText = formatRupiah(params.get('pokok'));
document.getElementById('jasa').innerText = formatRupiah(params.get('jasa'));
document.getElementById('total').innerText = formatRupiah(params.get('total'));

// Auto print saat halaman dibuka
window.onload = () => {
  setTimeout(() => window.print(), 500);
}
</script>

</body>
</html>
