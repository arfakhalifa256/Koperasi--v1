<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
body{
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1e90ff, #0f3057);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* ===== LOGIN BOX ===== */
.box{
  background:#fff;
  padding:28px 24px;
  border-radius:12px;
  width:320px;
  max-width:90vw;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
  text-align:center;
}

/* ===== LOGO ===== */
.box .logo{
  width:65px;
  height:65px;
  object-fit:contain;
  background:#f3f4f6;
  padding:8px;
  border-radius:50%;
  margin-bottom:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.box h3{
  margin:0 0 18px 0;
  text-align:center;
  color:#1f2937;
  font-size:18px;
  font-weight:700;
}

input, select{
  width:100%;
  height:42px;
  margin-bottom:12px;
  padding:10px 12px;
  border:1.5px solid #e5e7eb;
  border-radius:8px;
  font-size:13px;
  box-sizing:border-box;
  transition:0.2s;
}

input:focus, select:focus{
  outline:none;
  border-color:#1e90ff;
  box-shadow:0 0 0 3px rgba(30,144,255,0.1);
}

button{
  width:100%;
  height:42px;
  background:#1e90ff;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:8px;
  font-weight:600;
  font-size:14px;
  transition:0.2s;
}

button:hover{
  background:#0f3057;
  transform:translateY(-1px);
}

button:disabled{
  background:#9ca3af;
  cursor:not-allowed;
  transform:none;
}

.small{
  font-size:12px;
  text-align:center;
  color:#1e90ff;
  cursor:pointer;
  margin-top:8px;
}

.small:hover{
  text-decoration:underline;
}

#loading{
  display:none;
  text-align:center;
  font-size:13px;
  color:#1e90ff;
  margin:10px 0;
}

@media(max-width:480px){
  .box .logo{
    width:55px;
    height:55px;
  }
}
</style>
</head>

<body>
<div class="box">

  <!-- LOGO DI ATAS TEXT LOGIN -->
  <img src="img/icon-192.png" alt="Logo Koperasi ARFA" class="logo">

  <h3 id="title">Login</h3>

  <input type="text" id="username" placeholder="Username" autocomplete="username">
  <input type="password" id="password" placeholder="Password" autocomplete="current-password">

  <!-- PILIH ROLE -->
  <select id="roleSelect" style="display:none;">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select>

  <button id="btnLogin" onclick="login()">Login</button>
  <button id="btnRegister" onclick="register()" style="display:none;">Daftar</button>

  <div id="loading">Loading...</div>

  <div class="small" onclick="toggleMode()" id="toggleText">
    Belum punya akun? Daftar
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain:"arfa-c7dee.firebaseapp.com",
  databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId:"arfa-c7dee",
  storageBucket:"arfa-c7dee.appspot.com",
  messagingSenderId:"468058520812",
  appId:"1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let mode = "login";

window.toggleMode = function(){
  mode = mode === "login" ? "register" : "login";

  document.getElementById("title").innerText =
    mode === "login" ? "Login" : "Daftar";

  document.getElementById("btnLogin").style.display =
    mode === "login" ? "block" : "none";

  document.getElementById("btnRegister").style.display =
    mode === "register" ? "block" : "none";

  document.getElementById("roleSelect").style.display =
    mode === "register" ? "block" : "none";

  document.getElementById("toggleText").innerText =
    mode === "login"
      ? "Belum punya akun? Daftar"
      : "Sudah punya akun? Login";
};

window.register = async function(){
  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("roleSelect").value;

  const btn = document.getElementById("btnRegister");
  const loading = document.getElementById("loading");

  if(!username || !password){
    alert("Isi semua field");
    return;
  }

  btn.disabled = true;
  loading.style.display = "block";

  try{
    const userRef = ref(db,"users/" + username);
    const snap = await get(userRef);

    if(snap.exists()){
      alert("Username sudah dipakai");
      return;
    }

    await set(userRef,{
      username,
      password,
      role,
      createdAt: Date.now()
    });

    alert("Berhasil daftar sebagai " + role.toUpperCase());
    toggleMode();

  }catch(err){
    console.error(err);
    alert("Gagal daftar");
  }

  btn.disabled = false;
  loading.style.display = "none";
};

window.login = async function(){
  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  const btn = document.getElementById("btnLogin");
  const loading = document.getElementById("loading");

  if(!username || !password){
    alert("Isi username & password");
    return;
  }

  btn.disabled = true;
  loading.style.display = "block";

  try{
    const userRef = ref(db,"users/" + username);
    const snap = await get(userRef);

    if(!snap.exists()){
      alert("User tidak ditemukan");
      return;
    }

    const u = snap.val();

    if(u.password !== password){
      alert("Password salah");
      return;
    }

    localStorage.setItem("login","true");
    localStorage.setItem("username",u.username);
    localStorage.setItem("role",u.role);

    alert("Login berhasil sebagai " + u.role.toUpperCase());
    window.location.href = "dash.html";

  }catch(err){
    console.error(err);
    alert("Terjadi kesalahan");
  } finally {
    btn.disabled = false;
    loading.style.display = "none";
  }
};
</script>

</body>
</html>
