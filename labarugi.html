<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Pendapatan Koperasi</title>
  <style>
    :root{
      --primary:#3b82f6;
      --primary-dark:#2563eb;
      --success:#10b981;
      --danger:#ef4444;
      --gray-50:#f9fafb;
      --gray-100:#f3f4f6;
      --gray-200:#e5e7eb;
      --gray-600:#4b5563;
      --gray-800:#1f2937;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--gray-100);color:var(--gray-800)}
    
    header{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 2px 12px rgba(59,130,246,.25);
      position:sticky;
      top:0;
      z-index:100
    }
    .header-left{display:flex;align-items:center;gap:12px}
    .header-left h1{font-size:16px;font-weight:600}
    .btn-back{
      background:rgba(255,255,255,.2);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.3);
      color:#fff;
      width:36px;
      height:36px;
      border-radius:10px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s
    }
    .btn-back:hover{background:rgba(255,255,255,.3);transform:translateX(-2px)}
    .header-btns{display:flex;gap:8px}
    .header-btns button{
      background:rgba(255,255,255,.2);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.3);
      color:#fff;
      padding:7px 14px;
      border-radius:8px;
      font-size:12px;
      font-weight:600;
      cursor:pointer;
      transition:.2s
    }
    .header-btns button:hover{background:rgba(255,255,255,.3);transform:translateY(-1px)}
  
     
   
    .container{max-width:700px;margin:20px auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .periode{text-align:center;margin-bottom:20px;color:var(--gray-600);font-size:13px;font-weight:500}
    .filter{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
    .filter input{padding:9px 14px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px}
    .filter input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .filter button{padding:9px 18px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;transition:.2s}
    .filter button:hover{background:var(--primary-dark);transform:translateY(-1px)}
    
    .laporan h4{
      background:#d1fae5;
      color:#065f46;
      border:2px solid #6ee7b7;
      padding:10px 14px;
      border-radius:8px 8px 0 0;
      margin-top:16px;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.5px
    }
    .laporan h4:first-child{margin-top:0}
    .isi{border:1px solid var(--gray-200);border-top:none;padding:14px;border-radius:0 0 8px 8px;background:var(--gray-50)}
    .baris{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--gray-200);font-size:14px}
    .baris:last-child{border:none}
    .baris span:first-child{color:var(--gray-600)}
    .baris span:last-child{font-weight:500}
    .total{display:flex;justify-content:space-between;padding:12px 0;margin-top:10px;border-top:2px solid var(--gray-800);font-weight:700;font-size:15px}
    .shu-final{color:var(--success)}
    .shu-final.rugi{color:var(--danger)}
    
    .shu-box{margin-top:24px;padding:18px;border-radius:12px;text-align:center;font-weight:700;font-size:15px}
    .laba{background:#d1fae5;color:#065f46;border:2px solid #6ee7b7}
    .rugi{background:#fee2e2;color:#991b1b;border:2px solid #fca5a5}
    
    @media print{display:none}
    @media(max-width:640px){
      .container{margin:12px;padding:16px;border-radius:12px}
      header{padding:12px}
      .header-left h1{font-size:14px}
    }
  
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="btn-back" onclick="kembali()" title="Kembali">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>LAPORAN PENDAPATAN</h1>
    </div>
    <div class="header-btns">
      <button onclick="shareWA()">WA</button>
      <button onclick="exportPDF()">PDF</button>
    </div>
  </header>
  

  <div class="container" id="laporanContainer">
    <div class="periode" id="periode">Periode: 1 Jan 2026 - 31 Des 2026</div>
    
    <div class="filter">
      <input type="date" id="tglMulai" title="Tanggal Mulai">
      <input type="date" id="tglAkhir" title="Tanggal Akhir">
      <button onclick="hitungLabaRugi()">Tampilkan</button>
    </div>
          

    <div class="laporan">

      <h4>PENDAPATAN</h4>
      <div class="isi">
        <div class="baris"><span>Pendapatan Jasa Pinjaman</span><span id="pendapatanJasa">Rp 0</span></div>
        <div class="baris"><span>Pendapatan Lain-lain</span><span id="pendapatanLain">Rp 0</span></div>
        <div class="total"><span>TOTAL PENDAPATAN</span><span id="totalPendapatan">Rp 0</span></div>
      </div>

      <h4>BEBAN OPERASIONAL</h4>
      <div class="isi">
        <div class="baris"><span>Beban Gaji</span><span id="bebanGaji">Rp 0</span></div>
        <div class="baris"><span>Beban Listrik & Air</span><span id="bebanListrik">Rp 0</span></div>
        <div class="baris"><span>Beban ATK</span><span id="bebanAtk">Rp 0</span></div>
        <div class="baris"><span>Beban Lain-lain</span><span id="bebanLain">Rp 0</span></div>
        <div class="total"><span>TOTAL BEBAN</span><span id="totalBeban">Rp 0</span></div>
        <div class="total shu-final"><span>LABA/RUGI BERSIH</span><span id="labaBersih">Rp 0</span></div>
      </div>
    </div>

    <div id="shuBox" class="shu-box"></div>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
    authDomain: "arfa-c7dee.firebaseapp.com",
    databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
    projectId: "arfa-c7dee",
    storageBucket: "arfa-c7dee.firebasestorage.app",
    messagingSenderId: "468058520812",
    appId: "1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
  };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let dataGlobal = {};
  let dataSiap = false; // Flag biar tau data udah ke-load

  const rupiah = n => new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",minimumFractionDigits:0}).format(Number(n)||0);

  db.ref().on("value", snap=>{
    dataGlobal = snap.val() || {};
    dataSiap = true;
    hitungLabaRugi();
  });

  function hitungLabaRugi(){
    if(!dataSiap) return;
    const tglMulaiStr = document.getElementById("tglMulai").value;
    const tglAkhirStr = document.getElementById("tglAkhir").value;
    
    const tglMulai = tglMulaiStr ? new Date(tglMulaiStr).getTime() : new Date(new Date().getFullYear(), 0, 1).getTime();
    const tglAkhir = tglAkhirStr ? new Date(tglAkhirStr).getTime() + 86399999 : new Date().getTime();
    
    document.getElementById("periode").innerText = `Periode: ${new Date(tglMulai).toLocaleDateString("id-ID")} - ${new Date(tglAkhir).toLocaleDateString("id-ID")}`;

    const kasData = dataGlobal.kas || {};
    const transaksi = kasData.transaksi || {};

    let totalJasa = 0;
    Object.values(dataGlobal.angsuran || {}).forEach(a => {
      if (!a) return;
      const tgl = Number(a.tanggal || 0);
      if (tgl < tglMulai || tgl > tglAkhir) return;
      totalJasa += Number(a.jasa || 0);
    });

    let pendapatanLain = 0;
    Object.values(transaksi).forEach(t => {
      if (!t || t.tipe !== "masuk") return;
      const tgl = Number(t.tanggal || 0);
      if (tgl < tglMulai || tgl > tglAkhir) return;
      const kategori = (t.kategori || "").toLowerCase();
      if (kategori.includes("pendapatan") || kategori.includes("lain")) {
        pendapatanLain += Number(t.jumlah || 0);
      }
    });

    const totalPendapatan = totalJasa + pendapatanLain;

    let bebanGaji = 0;
    let bebanListrik = 0;
    let bebanAtk = 0;
    let bebanLain = 0;

    Object.values(transaksi).forEach(t => {
      if (!t || t.tipe !== "keluar") return;
      const tgl = Number(t.tanggal || 0);
      if (tgl < tglMulai || tgl > tglAkhir) return;
      const kategori = (t.kategori || "").toLowerCase();
      const jumlah = Number(t.jumlah || 0);
      if (["pinjaman", "pokok", "jasa", "simpanan"].includes(kategori)) return;

      if (kategori.includes("gaji")) bebanGaji += jumlah;
      else if (kategori.includes("listrik") || kategori.includes("air")) bebanListrik += jumlah;
      else if (kategori.includes("atk") || kategori.includes("alat tulis")) bebanAtk += jumlah;
      else bebanLain += jumlah;
    });

    const totalBeban = bebanGaji + bebanListrik + bebanAtk + bebanLain;
    const shu = totalPendapatan - totalBeban;

    document.getElementById("pendapatanJasa").innerText = rupiah(totalJasa);
    document.getElementById("pendapatanLain").innerText = rupiah(pendapatanLain);
    document.getElementById("totalPendapatan").innerText = rupiah(totalPendapatan);
    document.getElementById("bebanGaji").innerText = rupiah(bebanGaji);
    document.getElementById("bebanListrik").innerText = rupiah(bebanListrik);
    document.getElementById("bebanAtk").innerText = rupiah(bebanAtk);
    document.getElementById("bebanLain").innerText = rupiah(bebanLain);
    document.getElementById("totalBeban").innerText = rupiah(totalBeban);
    document.getElementById("labaBersih").innerText = rupiah(shu);
    document.getElementById("labaBersih").className = shu >= 0 ? "shu-final" : "shu-final rugi";

    const shuBox = document.getElementById("shuBox");
    if(shu >= 0){
      shuBox.className = "shu-box laba";
      shuBox.innerHTML = `SHU (LABA): ${rupiah(shu)}`;
    }else{
      shuBox.className = "shu-box rugi";
      shuBox.innerHTML = `SHU (RUGI): ${rupiah(Math.abs(shu))}`;
    }
  }

  window.kembali = () => {
    if(document.referrer && document.referrer.includes(window.location.hostname)){
      window.history.back();
    } else {
      window.location.href = "dash.html";
    }
  }

  function shareWA(){
    const periode = document.getElementById("periode").innerText;
    const jasa = document.getElementById("pendapatanJasa").innerText;
    const lain = document.getElementById("pendapatanLain").innerText;
    const totalPend = document.getElementById("totalPendapatan").innerText;
    const beban = document.getElementById("totalBeban").innerText;
    const laba = document.getElementById("labaBersih").innerText;
    
    const text = `*LAPORAN PENDAPATAN*\n${periode}\n\n*PENDAPATAN*\n- Jasa Pinjaman: ${jasa}\n- Lain-lain: ${lain}\n*Total: ${totalPend}*\n\n*BEBAN OPERASIONAL*\n*Total Beban: ${beban}*\n\n*LABA/RUGI BERSIH: ${laba}*`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank');
  }

function exportPDF(){
    if(!dataSiap || document.getElementById("totalPendapatan").innerText === "Rp 0"){
      alert("Data belum dimuat. Klik 'Tampilkan' dulu ya.");
      return;
    }
    
    const element = document.getElementById('laporanContainer').cloneNode(true);
    element.querySelector('.filter').style.display = 'none'; // Sembunyikan filter di PDF

    // Tambah Kop Surat khusus PDF
    const kop = document.createElement('div');
    kop.style.textAlign = 'center';
    kop.style.marginBottom = '20px';
    kop.style.borderBottom = '2px solid #1f2937';
    kop.style.paddingBottom = '12px';
    kop.innerHTML = `
      <h2 style="margin:0;font-size:18px;font-weight:700;color:#1f2937">LAPORAN PENDAPATAN</h2>
      <h3 style="margin:4px 0 0 0;font-size:14px;font-weight:600;color:#4b5563">KOPERASI DRIVER ARFA</h3>
    `;
    element.prepend(kop); // Taruh di paling atas

    const opt = {
      margin: 10,
      filename: `LAPORAN_PENDAPATAN_ARFA_${new Date().toISOString().slice(0,10)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
  }

  const now = new Date();
  document.getElementById("tglMulai").valueAsDate = new Date(now.getFullYear(), 0, 1);
  document.getElementById("tglAkhir").valueAsDate = now;
</script>
</body>
</html>
